name: Verify Expo build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund --silent
      - name: TypeScript check
        id: typecheck
        run: |
          npm run typecheck > tsc-errors.txt 2>&1
          cat tsc-errors.txt
      - name: Upload TypeScript errors
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tsc-errors
          path: tsc-errors.txt
      - name: Export Expo web
        id: webbuild
        run: |
          npm run build:web > expo-errors.txt 2>&1
          cat expo-errors.txt
      - name: Upload Expo errors
        if: failure() && steps.webbuild.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: expo-errors
          path: expo-errors.txt
